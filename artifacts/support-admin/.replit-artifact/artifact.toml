kind = "web"
previewPath = "/support-admin/"
title = "Bovogo Support"
version = "1.0.0"
id = "artifacts/support-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/support-admin/" ]
localPort = 20285

[services.development]
run = "pnpm --filter @workspace/support-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/support-admin", "run", "build" ]
publicDir = "artifacts/support-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20285"
BASE_PATH = "/support-admin/"
